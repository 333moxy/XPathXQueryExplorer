<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XPath & XQuery Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --code-font: 'Consolas', 'Monaco', monospace; }
        body { background-color: #f4f7f9; }
        
        .code-style {
            font-family: var(--code-font) !important;
            font-size: 14px !important;
            line-height: 22px !important;
            padding: 12px !important;
            tab-size: 2;
            box-sizing: border-box !important;
        }

        /* Editor container with invisible highlighter layer */
        /*.editor-container { position: relative; height: 400px; background: white; border: 1px solid #dee2e6; border-radius: 4px; overflow: hidden; }
        */
        .editor-container { position: relative; height: calc(100vh - 160px); background: white; border: 1px solid #dee2e6; border-radius: 4px; overflow: hidden; }
        #highlightLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; color: transparent !important; overflow: hidden; pointer-events: none; white-space: pre; }
        #xmlInput { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; background: transparent !important; color: #212529 !important; resize: none; outline: none; border: none; overflow: auto; white-space: pre; }

        /* Highlights */
        .xml-line { display: block; width: 100%; min-height: 22px; border-left: 3px solid transparent; }
        .hl-hover { background-color: #fff3cd !important; }
        .hl-sticky { background-color: #cfe2ff !important; border-left: 3px solid #0d6efd; font-weight: bold; }

        /* Results Display */
        .results-box { height: 500px; overflow-y: auto; border-radius: 4px; background: white; border: 1px solid #dee2e6; }
        .result-item { cursor: pointer; padding: 12px; border-bottom: 1px solid #f0f0f0; transition: 0.1s; user-select: none; }
        .result-item:hover { background-color: #f8f9fa; }
        .result-item.active-item { background-color: #e7f1ff; }
        .snippet { font-size: 13px; color: #444; font-family: var(--code-font); white-space: pre-wrap; }

        /* XQuery Large Editor */
        #xqueryInput { height: 250px; font-family: var(--code-font); resize: vertical; }
        #xqueryOutput { height: 400px; font-family: var(--code-font); background: #282c34; color: #abb2bf; white-space: pre; padding: 15px; border-radius: 4px; overflow: auto; cursor: copy; }

        .nav-tabs .nav-link { font-weight: bold; color: #6c757d; cursor: pointer; }
        .nav-tabs .nav-link.active { color: #0d6efd; }
        .copy-toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 8px 16px; border-radius: 4px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="copyToast" class="copy-toast">Copied to clipboard!</div>

<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="m-0 fw-bold">XPath & XQuery Explorer</h4>
        <ul class="nav nav-tabs border-0" id="modeTabs">
            <li class="nav-item">
                <a class="nav-link active" onclick="switchMode('xpath')">XPath</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" onclick="switchMode('xquery')">XQuery</a>
            </li>
        </ul>
    </div>

    <!-- Source XML (Common to both, but varies in size) -->
    <div class="row">
        <div id="xmlContainer" class="col-md-6">
            <h6 class="text-muted text-uppercase small fw-bold mb-2">Source XML</h6>
            <div class="editor-container">
                <div id="highlightLayer" class="code-style"></div>
                <textarea id="xmlInput" class="code-style" spellcheck="false" oninput="syncText()" onscroll="syncScroll()"><root>
  <item category="electronics">
    <name>Smartphone</name>
    <price>799</price>
  </item>
  <item category="book">
    <name>XML Guide</name>
    <price>45</price>
  </item>
</root></textarea>
            </div>
        </div>

        <!-- Right Side: Dynamic Content -->
        <div id="actionContainer" class="col-md-6">
            
            <!-- XPATH VIEW -->
            <div id="xpathView">
                <h6 class="text-muted text-uppercase small fw-bold mb-2">XPath Query</h6>
                <div class="input-group mb-3">
                    <input type="text" id="xpathQuery" class="form-control code-style" placeholder="//item" value="//item">
                    <button class="btn btn-primary px-4" onclick="runQuery('xpath')">Run</button>
                </div>
                <h6 class="text-muted text-uppercase small fw-bold mb-2">Results</h6>
                <div class="results-box">
                    <div id="xpathResults" class="list-group list-group-flush"></div>
                    <div id="xpathEmpty" class="p-5 text-center text-muted">No results found.</div>
                </div>
            </div>

            <!-- XQUERY VIEW -->
            <div id="xqueryView" style="display: none;">
                <h6 class="text-muted text-uppercase small fw-bold mb-2">XQuery Expression</h6>
                <textarea id="xqueryInput" class="form-control code-style mb-3" placeholder="for $x in //item return $x/name" onkeydown="handleTab(event, this)">for $x in //item
return <result>{ $x/name/text() }</result></textarea>
                <button class="btn btn-primary w-100 mb-3" onclick="runQuery('xquery')">Run</button>
                
                <h6 class="text-muted text-uppercase small fw-bold mb-2">Result</h6>
                <div id="xqueryOutput" class="code-style" ondblclick="copyContent(this.innerText)"></div>
            </div>

        </div>
    </div>
</div>

<script>
    let currentMode = 'xpath';

    function switchMode(mode) {
        currentMode = mode;
        // Toggle tabs
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');

        // Toggle Views
        document.getElementById('xpathView').style.display = mode === 'xpath' ? 'block' : 'none';
        document.getElementById('xqueryView').style.display = mode === 'xquery' ? 'block' : 'none';
        
        // Adjust XML container height for better flow in XQuery mode
        //document.querySelector('.editor-container').style.height = mode === 'xpath' ? '400px' : '250px';
    }

    function handleTab(e, el) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = el.selectionStart;
            el.value = el.value.substring(0, start) + "  " + el.value.substring(el.selectionEnd);
            el.selectionStart = el.selectionEnd = start + 2;
        }
    }

    // Input XML Logic
    const input = document.getElementById('xmlInput');
    const layer = document.getElementById('highlightLayer');

    input.addEventListener('keydown', (e) => handleTab(e, input));

    function syncText() {
        const lines = input.value.split('\n');
        layer.innerHTML = lines.map((line, i) => 
            `<span class="xml-line" id="line-${i+1}">${escapeHtml(line) || '&nbsp;'}</span>`
        ).join('');
        syncScroll();
    }

    function syncScroll() {
        layer.scrollTop = input.scrollTop;
        layer.scrollLeft = input.scrollLeft;
    }

    function runQuery(mode) {
        const query = mode === 'xpath' ? document.getElementById('xpathQuery').value : document.getElementById('xqueryInput').value;
        const formData = new FormData();
        formData.append('xml', input.value);
        formData.append('query', query);
        formData.append('engine', mode);

        fetch('/evaluate', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.status === "error") { alert(data.message); return; }

                if (mode === 'xpath') {
                    const list = document.getElementById('xpathResults');
                    const empty = document.getElementById('xpathEmpty');
                    list.innerHTML = '';
                    empty.style.display = data.results.length ? 'none' : 'block';

                    data.results.forEach(res => {
                        const div = document.createElement('div');
                        div.className = 'result-item';
                        div.innerHTML = `<div class="snippet">${escapeHtml(res.content)}</div>`;
                        
                        div.onmouseenter = () => highlightRange(res.start, res.end, 'hl-hover', true);
                        div.onmouseleave = () => highlightRange(res.start, res.end, 'hl-hover', false);
                        div.onclick = () => {
                            const isActive = div.classList.toggle('active-item');
                            highlightRange(res.start, res.end, 'hl-sticky', isActive);
                        };
                        div.ondblclick = () => copyContent(res.content);
                        list.appendChild(div);
                    });
                } else {
                    document.getElementById('xqueryOutput').innerText = data.generated_xml;
                }
            });
    }

    function highlightRange(start, end, className, activate) {
        if (!start) return;
        for (let i = start; i <= end; i++) {
            const el = document.getElementById('line-' + i);
            if (el) el.classList[activate ? 'add' : 'remove'](className);
        }
    }

    function copyContent(text) {
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('copyToast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1500);
        });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    syncText();
</script>
</body>
</html>
